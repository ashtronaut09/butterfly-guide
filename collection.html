<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butterfly Collection Manager</title>
  <link rel="stylesheet" href="css/collection.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header class="app-header">
  <div class="header-brand">
    <span class="brand-icon">🦋</span>
    <div>
      <h1>Butterfly Collection</h1>
      <div id="specimen-count">Loading…</div>
    </div>
  </div>

  <div class="search-wrap">
    <!-- Search icon (inline SVG, no external dependency) -->
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="collection-search"
           type="search"
           placeholder="Search name, supplier, location…"
           autocomplete="off"
           aria-label="Search specimens">
  </div>
</header>

<!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
<div class="toolbar" role="toolbar" aria-label="Collection controls">

  <!-- Filter: Supplier -->
  <div class="filter-group">
    <label for="filter-supplier">Supplier</label>
    <select id="filter-supplier" class="filter-select" aria-label="Filter by supplier">
      <option value="">All Suppliers</option>
      <!-- Populated dynamically by collection-app.js -->
    </select>
  </div>

  <!-- Filter: Sex -->
  <div class="filter-group">
    <label for="filter-sex">Sex</label>
    <select id="filter-sex" class="filter-select" aria-label="Filter by sex">
      <option value="">All Sexes</option>
      <!-- Populated dynamically -->
    </select>
  </div>

  <!-- Filter: Location -->
  <div class="filter-group">
    <label for="filter-location">Location</label>
    <select id="filter-location" class="filter-select" aria-label="Filter by location">
      <option value="">All Locations</option>
      <!-- Populated dynamically -->
    </select>
  </div>

  <!-- Filter: Price range -->
  <div class="filter-group filter-group--price">
    <label>Price</label>
    <input id="filter-price-min" type="number" min="0" step="0.01"
           class="filter-price-input" placeholder="min" aria-label="Minimum price">
    <span class="filter-price-sep">–</span>
    <input id="filter-price-max" type="number" min="0" step="0.01"
           class="filter-price-input" placeholder="max" aria-label="Maximum price">
  </div>

  <div class="toolbar-divider" aria-hidden="true"></div>

  <!-- View toggle -->
  <div class="view-toggle" role="group" aria-label="View mode">
    <button class="view-btn view-btn--active" data-view="table" title="Table view" aria-label="Table view">☰</button>
    <button class="view-btn" data-view="grid" title="Grid view" aria-label="Grid view">⊞</button>
  </div>

  <!-- Sort -->
  <select id="sort-select" class="sort-select" aria-label="Sort specimens">
    <option value="english_name">A–Z by name</option>
    <option value="latin_name">A–Z scientific</option>
    <option value="supplier_name">By supplier</option>
    <option value="price_asc">Price: low → high</option>
    <option value="price_desc">Price: high → low</option>
    <option value="date_acquired">By date acquired</option>
  </select>

  <!-- Push action buttons to the right -->
  <div class="toolbar-spacer" aria-hidden="true"></div>

  <button id="btn-add-specimen" class="btn btn-primary" type="button"
          aria-label="Add a new specimen">
    + Add Specimen
  </button>

  <button id="btn-generate-labels" class="btn btn-labels" type="button"
          aria-label="Generate printable labels for selected specimens">
    Generate Labels
  </button>

  <button id="btn-export" class="btn btn-secondary" type="button"
          aria-label="Export collection as JSON backup">
    Export JSON
  </button>

  <button id="btn-import" class="btn btn-secondary" type="button"
          aria-label="Import collection from JSON backup">
    Import JSON
  </button>
  <input id="import-file-input" type="file" accept=".json" style="display:none">

</div>

<!-- ── Active filter chips ──────────────────────────────────────────────── -->
<div id="filter-chips" class="filter-chips-bar" hidden aria-label="Active filters" role="region"></div>

<!-- ── Main content ─────────────────────────────────────────────────────── -->
<main class="collection-main" id="collection-main">
  <!--
    Specimen cards are rendered here by collection-app.js.
    The grid starts empty; init() populates it after DB is ready.
  -->
  <div id="specimen-grid" role="list" aria-label="Specimen collection">
    <!-- Loading placeholder — replaced by renderGrid() -->
    <div class="empty-state">
      <div class="empty-icon">
        <span class="spinner"></span>
      </div>
      <h3>Loading collection…</h3>
      <p>Opening database and checking for seed data.</p>
    </div>
  </div>
</main>

<!-- ── Detail panel ─────────────────────────────────────────────────────── -->
<!--
  Slide-in panel (not a modal) — stays alongside the grid on desktop,
  full-width overlay on mobile. Content rendered by renderDetailPanel().
-->
<aside id="detail-panel" role="complementary" aria-label="Specimen detail"
       aria-hidden="true">
  <!-- Content injected by collection-app.js → renderDetailPanel() -->
</aside>

<!-- ── Status bar ────────────────────────────────────────────────────────── -->
<div id="status-bar" class="status-bar" role="status" aria-live="polite">
  Initialising…
</div>

<!-- ── Toast notifications ───────────────────────────────────────────────── -->
<div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Scripts ───────────────────────────────────────────────────────────── -->
<!--
  jsPDF — used by the label generation feature (WP3).
  Loaded here so collection-app.js can reference window.jspdf without
  a dynamic import when the feature is implemented.
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<!--
  App modules — ES modules, loaded after the DOM is painted.
  db.js is imported by collection-app.js; list it first for clarity only
  (browsers handle the import graph automatically).
-->
<script type="module" src="js/db.js"></script>
<script type="module" src="js/photos.js"></script>
<script type="module" src="js/photo-seeder.js"></script>
<script type="module" src="js/labels.js"></script>
<script type="module" src="js/collection-app.js"></script>

</body>
</html>
